name: Diagnostics

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deploy
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, os

          API_KEY = os.environ['RENDER_KEY']
          SID = 'srv-d959uffaqgkc73esmtm0'
          HEADERS = {'Authorization': f'Bearer {API_KEY}', 'Content-Type': 'application/json', 'Accept': 'application/json'}

          # Try different deploy endpoints
          for endpoint in [
              f'https://api.render.com/v1/services/{SID}/deploys',
              f'https://api.render.com/v1/services/{SID}/deploy',
          ]:
              print(f"\nTrying: {endpoint}")
              req = urllib.request.Request(
                  endpoint,
                  data=b'{}',
                  headers=HEADERS,
                  method='POST'
              )
              try:
                  resp = urllib.request.urlopen(req, timeout=30)
                  body = resp.read().decode()
                  print(f"  Status: {resp.status}")
                  print(f"  Body: {body[:300]}")
              except urllib.error.HTTPError as e:
                  print(f"  HTTP {e.code}: {e.read().decode()[:300]}")
              except Exception as e:
                  print(f"  Error: {e}")

          # Also check deploys list
          print("\n=== Recent deploys ===")
          req2 = urllib.request.Request(
              f'https://api.render.com/v1/services/{SID}/deploys?limit=5',
              headers={'Authorization': f'Bearer {API_KEY}', 'Accept': 'application/json'}
          )
          try:
              resp2 = urllib.request.urlopen(req2, timeout=30)
              deploys = json.loads(resp2.read())
              for d in deploys:
                  dd = d.get('deploy', {})
                  print(f"  {dd.get('id', '?')}: status={dd.get('status', '?')}, finishedAt={dd.get('finishedAt', 'N/A')}")
          except Exception as e:
              print(f"  Error: {e}")
          PYEOF
