name: Diagnostics

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Service Status
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -s "https://api.render.com/v1/services/srv-d959uffaqgkc73esmtm0" \
            -H "Authorization: Bearer ${RENDER_KEY}" \
            -H "Accept: application/json" | jq -r '
              "Name: \(.name)",
              "ID: \(.id)",
              "URL: \(.serviceDetails.url // "N/A")",
              "Dashboard: \(.dashboardUrl)",
              "Status: \(.serviceDetails.suspended // "unknown")",
              "HealthCheck: \(.serviceDetails.healthCheckPath // "none")",
              "LastDeploy: \(.serviceDetails.lastSuccessfulDeployAt // "never")",
              "BuildPlan: \(.serviceDetails.buildPlan)",
              "AutoDeploy: \(.autoDeploy)"
            '
