name: Diagnostics

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Check for abby-ai-runtime
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, os

          API_KEY = os.environ['RENDER_KEY']
          HEADERS = {
              'Authorization': f'Bearer {API_KEY}',
              'Accept': 'application/json'
          }

          def api(method, path, data=None):
              url = f'https://api.render.com/v1{path}'
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, data=body, headers={
                  **HEADERS, 'Content-Type': 'application/json'
              }, method=method)
              try:
                  resp = urllib.request.urlopen(req, timeout=30)
                  return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  return {'_error': f'{e.code}: {e.read().decode()[:200]}'}
              except Exception as e:
                  return {'_error': str(e)}

          print('=== ALL SERVICES ===')
          services = api('GET', '/services?limit=100')
          names = []
          for item in (services if isinstance(services, list) else []):
              s = item.get('service', {})
              name = s.get('name', '?')
              names.append(name)
              if 'abby' in name.lower():
                  print(f"FOUND ABBY SERVICE: {name} | {s.get('id')} | {s.get('dashboardUrl')}")

          print(f'\nTotal services: {len(names)}')
          print(f'Service names: {names}')

          if 'abby-ai-runtime' not in names:
              print('\n=== TRYING TO CREATE ===')
              result = api('POST', '/services', {
                  'type': 'web_service',
                  'name': 'abby-ai-runtime',
                  'ownerId': 'tea-d8qqtternols73ehmla0',
                  'repo': 'https://github.com/ABBYCRM/abby-ai-runtime',
                  'branch': 'main',
                  'runtime': 'docker',
                  'region': 'oregon',
                  'plan': 'starter',
                  'dockerfilePath': './Dockerfile',
                  'healthCheckPath': '/health',
                  'autoDeploy': 'yes',
                  'serviceDetails': {'env': 'docker', 'envSpecificDetails': {}}
              })
              print(f'Create result: {json.dumps(result, indent=2)[:800]}')
          PYEOF
