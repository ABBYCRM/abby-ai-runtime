name: Diagnostics

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Build Status
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, os

          API_KEY = os.environ['RENDER_KEY']
          SID = 'srv-d959uffaqgkc73esmtm0'
          HEADERS = {'Authorization': f'Bearer {API_KEY}', 'Accept': 'application/json'}

          def api(method, path, data=None):
              url = f'https://api.render.com/v1{path}'
              body = json.dumps(data).encode() if data else None
              h = {**HEADERS, 'Content-Type': 'application/json'}
              req = urllib.request.Request(url, data=body, headers=h, method=method)
              try:
                  resp = urllib.request.urlopen(req, timeout=30)
                  return json.loads(resp.read()) if resp.status != 204 else {}
              except urllib.error.HTTPError as e:
                  return {'_error': f'{e.code}: {e.read().decode()[:200]}'}
              except Exception as e:
                  return {'_error': str(e)}

          # Get latest deploys
          print('=== DEPLOY STATUS ===')
          deploys = api('GET', f'/services/{SID}/deploys?limit=5')
          if isinstance(deploys, list):
              for d in deploys:
                  dd = d.get('deploy', {})
                  status = dd.get('status', '?')
                  commit = dd.get('commit', {}).get('id', '?')[:8]
                  started = dd.get('startedAt', 'N/A')
                  finished = dd.get('finishedAt', 'N/A')
                  print(f"  {dd.get('id', '?')}: {status} | commit={commit} | started={started} | finished={finished}")
          else:
              print(f"  Error: {json.dumps(deploys)[:200]}")

          # Get deploy details for latest
          if isinstance(deploys, list) and deploys:
              latest_id = deploys[0].get('deploy', {}).get('id')
              if latest_id:
                  print(f'\n=== DEPLOY {latest_id} DETAILS ===')
                  details = api('GET', f'/services/{SID}/deploys/{latest_id}')
                  if isinstance(details, dict) and 'deploy' in details:
                      dd = details['deploy']
                      print(f"Status: {dd.get('status')}")
                      print(f"Commit: {dd.get('commit', {}).get('id', '?')[:8]}")
                      # Try to get build logs if failed
                      if dd.get('status') == 'build_failed':
                          print(f"Build failed - try Render dashboard: https://dashboard.render.com/web/{SID}")
                  else:
                      print(f"Details: {json.dumps(details)[:500]}")
          PYEOF
