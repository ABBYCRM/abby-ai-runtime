name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, os

          API_KEY = os.environ['RENDER_KEY']
          SID = 'srv-d959uffaqgkc73esmtm0'
          HEADERS = {'Authorization': f'Bearer {API_KEY}', 'Content-Type': 'application/json', 'Accept': 'application/json'}

          def api(method, path, data=None):
              url = f'https://api.render.com/v1{path}'
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, data=body, headers=HEADERS, method=method)
              try:
                  resp = urllib.request.urlopen(req, timeout=30)
                  return json.loads(resp.read()) if resp.status != 204 else {}
              except urllib.error.HTTPError as e:
                  return {'_error': f'{e.code}: {e.read().decode()[:200]}'}
              except Exception as e:
                  return {'_error': str(e)}

          # Step 1: Verify service exists
          print('=== Step 1: Verify service ===')
          svc = api('GET', f'/services/{SID}')
          name = svc.get('service', {}).get('name', 'NOT FOUND')
          print(f'  Service: {name}')

          # Step 2: Ensure env vars are set
          print('=== Step 2: Set env vars ===')
          env_vars = {'PORT': '10000', 'HOST': '0.0.0.0'}
          for k, v in env_vars.items():
              r = api('PUT', f'/services/{SID}/env-vars/{k}', {'value': v})
              print(f'  {k}: ok' if '_error' not in r else f'  {k}: fail')

          # Step 3: TRIGGER DEPLOY (the critical missing step)
          print('=== Step 3: TRIGGER DEPLOY ===')
          deploy = api('POST', f'/services/{SID}/deploys', {'clearCache': 'do_not_clear'})
          if '_error' in deploy:
              print(f'  Deploy trigger failed: {deploy["_error"]}')
              # Try alternate endpoint
              deploy2 = api('POST', f'/services/{SID}/deploy', {})
              print(f'  Alternate: {deploy2}')
          else:
              did = deploy.get('id', deploy.get('deploy', {}).get('id', '?'))
              print(f'  Deploy triggered: {did}')

          print('=== DEPLOY TRIGGERED ===')
          PYEOF
