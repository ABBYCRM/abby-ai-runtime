name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
          NIM_KEY_0: ${{ secrets.NIM_API_KEY }}
          NIM_KEY_1: ${{ secrets.NIM_API_KEY_1 }}
          NIM_KEY_2: ${{ secrets.NIM_API_KEY_2 }}
          NIM_KEY_3: ${{ secrets.NIM_API_KEY_3 }}
          NIM_KEY_4: ${{ secrets.NIM_API_KEY_4 }}
          NIM_KEY_5: ${{ secrets.NIM_API_KEY_5 }}
          NIM_KEY_6: ${{ secrets.NIM_API_KEY_6 }}
          NIM_KEY_7: ${{ secrets.NIM_API_KEY_7 }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, os, sys

          API_KEY = os.environ['RENDER_KEY']
          HEADERS = {
              'Authorization': f'Bearer {API_KEY}',
              'Content-Type': 'application/json',
              'Accept': 'application/json'
          }

          def api(method, path, data=None):
              url = f'https://api.render.com/v1{path}'
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, data=body, headers=HEADERS, method=method)
              try:
                  resp = urllib.request.urlopen(req, timeout=30)
                  return json.loads(resp.read()) if resp.status != 204 else {}
              except urllib.error.HTTPError as e:
                  err = e.read().decode()
                  print(f'API ERROR {e.code}: {err}')
                  return None
              except Exception as e:
                  print(f'Network error: {e}')
                  return None

          # Step 1: Find existing service
          print('=== Finding service ===')
          services = api('GET', '/services?limit=100') or []
          sid = None
          for item in services:
              s = item.get('service', {})
              if s.get('name') == 'abby-ai-runtime':
                  sid = s['id']
                  print(f'Found existing: {sid}')
                  break

          # Step 2: Create if not found
          if not sid:
              print('=== Creating service ===')
              result = api('POST', '/services', {
                  'type': 'web_service',
                  'name': 'abby-ai-runtime',
                  'repo': 'https://github.com/ABBYCRM/abby-ai-runtime',
                  'branch': 'main',
                  'runtime': 'docker',
                  'region': 'oregon',
                  'plan': 'starter',
                  'dockerfilePath': './Dockerfile',
                  'healthCheckPath': '/health',
                  'autoDeploy': 'yes'
              })
              if result:
                  sid = result.get('id') or result.get('service', {}).get('id')
                  print(f'Created: {sid}')
                  print(f'Full response: {json.dumps(result)[:500]}')
              else:
                  print('CREATE FAILED')
                  sys.exit(1)

          if not sid:
              print('No service ID. Aborting.')
              sys.exit(1)

          # Step 3: Set env vars
          print('\n=== Setting env vars ===')
          env_vars = {
              'PORT': '9000',
              'HOST': '0.0.0.0',
              'ABBY_MODEL': 'nvidia/llama-3.1-nemotron-70b-instruct',
              'NIM_BASE_URL': 'https://integrate.api.nvidia.com/v1',
              'ABBY_MAX_TOKENS': '8192',
              'ABBY_CREW_TEMP': '0.2',
              'ABBY_METAGPT_TEMP': '0.1',
          }
          for i in range(8):
              val = os.environ.get(f'NIM_KEY_{i}', '')
              if val:
                  env_vars[f'NIM_API_KEY' if i == 0 else f'NIM_API_KEY_{i}'] = val

          for key, value in env_vars.items():
              print(f'  {key}... ', end='', flush=True)
              r = api('PUT', f'/services/{sid}/env-vars/{key}', {'value': value})
              print('ok' if r else 'fail')

          # Step 4: Verify
          print('\n=== Verify ===')
          info = api('GET', f'/services/{sid}')
          if info:
              s = info.get('service', {})
              print(f"Name: {s.get('name')}")
              print(f"ID: {s.get('id')}")
              print(f"Dashboard: {s.get('dashboardUrl')}")
              print(f"Suspended: {s.get('serviceDetails', {}).get('suspended', 'N/A')}")
              print(f"URL: https://{s.get('name')}.onrender.com")

          print('\nDEPLOY COMPLETE')
          PYEOF
