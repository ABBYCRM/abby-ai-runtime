name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -e
          echo "=== Step 1: Find or Create Service ==="
          
          SERVICES=$(curl -s -X GET "https://api.render.com/v1/services?limit=100" \
            -H "Authorization: Bearer ${RENDER_KEY}" \
            -H "Accept: application/json")
          
          SID=$(echo "${SERVICES}" | jq -r '.[] | select(.service.name=="abby-ai-runtime") | .service.id // empty')
          
          if [ -n "$SID" ]; then
            echo "Found existing service: ${SID}"
          else
            echo "Creating new service..."
            
            cat > /tmp/payload.json << 'PAYLOAD'
          {"type":"web_service","name":"abby-ai-runtime","repo":"https://github.com/ABBYCRM/abby-ai-runtime","branch":"main","runtime":"docker","region":"oregon","plan":"starter","dockerfilePath":"./Dockerfile","healthCheckPath":"/health","autoDeploy":true}
          PAYLOAD
            
            CREATE=$(curl -s -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer ${RENDER_KEY}" \
              -H "Content-Type: application/json" \
              -d @/tmp/payload.json)
            
            echo "Response: ${CREATE}"
            SID=$(echo "${CREATE}" | jq -r '.service.id // .id // empty')
            echo "New service ID: ${SID}"
          fi
          
          if [ -z "$SID" ]; then
            echo "ERROR: Could not get service ID"
            exit 1
          fi
          
          echo "=== Step 2: Set Environment Variables ==="
          
          set_env() {
            echo -n "  $1="
            curl -s -X PUT "https://api.render.com/v1/services/${SID}/env-vars/$1" \
              -H "Authorization: Bearer ${RENDER_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"value\":\"$2\"}" | jq -r '.envVar.key // "error"'
          }
          
          set_env "PORT" "9000"
          set_env "HOST" "0.0.0.0"
          set_env "ABBY_MODEL" "nvidia/llama-3.1-nemotron-70b-instruct"
          set_env "NIM_BASE_URL" "https://integrate.api.nvidia.com/v1"
          set_env "ABBY_MAX_TOKENS" "8192"
          set_env "ABBY_CREW_TEMP" "0.2"
          set_env "ABBY_METAGPT_TEMP" "0.1"
          set_env "NIM_API_KEY" "${{ secrets.NIM_API_KEY }}"
          set_env "NIM_API_KEY_1" "${{ secrets.NIM_API_KEY_1 }}"
          set_env "NIM_API_KEY_2" "${{ secrets.NIM_API_KEY_2 }}"
          set_env "NIM_API_KEY_3" "${{ secrets.NIM_API_KEY_3 }}"
          set_env "NIM_API_KEY_4" "${{ secrets.NIM_API_KEY_4 }}"
          set_env "NIM_API_KEY_5" "${{ secrets.NIM_API_KEY_5 }}"
          set_env "NIM_API_KEY_6" "${{ secrets.NIM_API_KEY_6 }}"
          set_env "NIM_API_KEY_7" "${{ secrets.NIM_API_KEY_7 }}"
          
          echo "=== Step 3: Verify ==="
          curl -s "https://api.render.com/v1/services/${SID}" \
            -H "Authorization: Bearer ${RENDER_KEY}" \
            -H "Accept: application/json" | jq '{name: .service.name, id: .service.id, url: .service.dashboardUrl, status: .service.serviceDetails.suspended}'
          
          echo ""
          echo "DONE. Service will auto-deploy."
          echo "Dashboard: https://dashboard.render.com/web/${SID}"
