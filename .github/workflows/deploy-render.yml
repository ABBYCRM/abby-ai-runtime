name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Render Web Service
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "=== Looking for existing abby-ai-runtime service ==="
          
          # Get all services and find the one named exactly "abby-ai-runtime"
          SERVICES=$(curl -s -X GET "https://api.render.com/v1/services?limit=100" \
            -H "Authorization: Bearer ${RENDER_KEY}" \
            -H "Accept: application/json")
          
          echo "Services found: $(echo "${SERVICES}" | jq '. | length')"
          
          SID=$(echo "${SERVICES}" | jq -r '.[] | select(.service.name=="abby-ai-runtime") | .service.id // empty')
          
          if [ -n "$SID" ]; then
            echo "Found existing service: ${SID}"
            echo "SERVICE_ID=${SID}" >> $GITHUB_ENV
          else
            echo "=== Creating new Web Service ==="
            
            # Create JSON payload in a file to avoid escaping issues
            cat > /tmp/create_payload.json << 'EOF'
          {
            "type": "web_service",
            "name": "abby-ai-runtime",
            "repo": "https://github.com/ABBYCRM/abby-ai-runtime",
            "branch": "main",
            "runtime": "docker",
            "region": "oregon",
            "plan": "starter",
            "dockerfilePath": "./Dockerfile",
            "healthCheckPath": "/health",
            "autoDeploy": true
          }
          EOF
            
            CREATE=$(curl -s -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer ${RENDER_KEY}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d @/tmp/create_payload.json)
            
            echo "Create response: ${CREATE}"
            SID=$(echo "${CREATE}" | jq -r '.id // .service.id // empty')
            echo "Extracted ID: ${SID}"
            echo "SERVICE_ID=${SID}" >> $GITHUB_ENV
          fi

      - name: Set Environment Variables
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ env.SERVICE_ID }}
        run: |
          if [ -z "$SERVICE_ID" ]; then
            echo "No service ID. Skipping env vars."
            exit 0
          fi
          
          echo "=== Setting env vars on service ${SERVICE_ID} ==="
          
          set_env() {
            echo -n "  Setting $1... "
            RESULT=$(curl -s -X PUT "https://api.render.com/v1/services/${SERVICE_ID}/env-vars/${1}" \
              -H "Authorization: Bearer ${RENDER_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"value\":\"${2}\"}")
            echo "${RESULT}"
          }
          
          set_env "PORT" "9000"
          set_env "HOST" "0.0.0.0"
          set_env "ABBY_MODEL" "nvidia/llama-3.1-nemotron-70b-instruct"
          set_env "NIM_BASE_URL" "https://integrate.api.nvidia.com/v1"
          set_env "ABBY_MAX_TOKENS" "8192"
          set_env "ABBY_CREW_TEMP" "0.2"
          set_env "ABBY_METAGPT_TEMP" "0.1"
          set_env "NIM_API_KEY" "${{ secrets.NIM_API_KEY }}"
          set_env "NIM_API_KEY_1" "${{ secrets.NIM_API_KEY_1 }}"
          set_env "NIM_API_KEY_2" "${{ secrets.NIM_API_KEY_2 }}"
          set_env "NIM_API_KEY_3" "${{ secrets.NIM_API_KEY_3 }}"
          set_env "NIM_API_KEY_4" "${{ secrets.NIM_API_KEY_4 }}"
          set_env "NIM_API_KEY_5" "${{ secrets.NIM_API_KEY_5 }}"
          set_env "NIM_API_KEY_6" "${{ secrets.NIM_API_KEY_6 }}"
          set_env "NIM_API_KEY_7" "${{ secrets.NIM_API_KEY_7 }}"
          
          echo "Env vars done"

      - name: Trigger Deploy
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ env.SERVICE_ID }}
        run: |
          if [ -z "$SERVICE_ID" ]; then
            echo "No service ID. Cannot deploy."
            exit 1
          fi
          
          echo "=== Triggering deploy for ${SERVICE_ID} ==="
          DEPLOY=$(curl -s -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          echo "Deploy response: ${DEPLOY}"

      - name: Verify Service
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "=== Checking service list ==="
          curl -s "https://api.render.com/v1/services?name=abby-ai-runtime" \
            -H "Authorization: Bearer ${RENDER_KEY}" \
            -H "Accept: application/json" | jq '.[] | {name: .service.name, id: .service.id, url: .service.dashboardUrl}'
