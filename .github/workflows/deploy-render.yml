name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "=== Step 1: List services ==="
          SERVICES=$(curl -s -X GET "https://api.render.com/v1/services?limit=100" \
            -H "Authorization: Bearer ${RENDER_KEY}" \
            -H "Accept: application/json" || echo "[]")
          echo "Raw services response length: ${#SERVICES}"
          echo "Services: ${SERVICES}" | head -c 500
          echo ""
          
          echo "=== Step 2: Find abby-ai-runtime ==="
          SID=$(echo "${SERVICES}" | jq -r '.[] | select(.service.name=="abby-ai-runtime") | .service.id // empty' 2>/dev/null || echo "")
          echo "Found SID: '${SID}'"
          
          if [ -z "$SID" ]; then
            echo "=== Step 3: Create service ==="
            CREATE=$(curl -s -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer ${RENDER_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"type":"web_service","name":"abby-ai-runtime","repo":"https://github.com/ABBYCRM/abby-ai-runtime","branch":"main","runtime":"docker","region":"oregon","plan":"starter","dockerfilePath":"./Dockerfile","healthCheckPath":"/health","autoDeploy":true}' || echo '{"error":"curl failed"}')
            echo "Create response: ${CREATE}"
            SID=$(echo "${CREATE}" | jq -r '.service.id // .id // empty' 2>/dev/null || echo "")
            echo "New SID: '${SID}'"
          fi
          
          if [ -z "$SID" ]; then
            echo "WARNING: No service ID. Checking what services exist:"
            echo "${SERVICES}" | jq -r '.[].service.name' 2>/dev/null || echo "cannot parse"
            exit 0
          fi
          
          echo "=== Step 4: Set env vars on ${SID} ==="
          
          set_env() {
            RESULT=$(curl -s -X PUT "https://api.render.com/v1/services/${SID}/env-vars/$1" \
              -H "Authorization: Bearer ${RENDER_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"value\":\"$2\"}" || echo "curl-fail")
            echo "  $1: $(echo "${RESULT}" | jq -r '.message // .envVar.key // "ok"' 2>/dev/null || echo "set")"
          }
          
          set_env "PORT" "9000"
          set_env "HOST" "0.0.0.0"
          set_env "ABBY_MODEL" "nvidia/llama-3.1-nemotron-70b-instruct"
          set_env "NIM_BASE_URL" "https://integrate.api.nvidia.com/v1"
          set_env "ABBY_MAX_TOKENS" "8192"
          set_env "ABBY_CREW_TEMP" "0.2"
          set_env "ABBY_METAGPT_TEMP" "0.1"
          set_env "NIM_API_KEY" "${{ secrets.NIM_API_KEY }}"
          set_env "NIM_API_KEY_1" "${{ secrets.NIM_API_KEY_1 }}"
          set_env "NIM_API_KEY_2" "${{ secrets.NIM_API_KEY_2 }}"
          set_env "NIM_API_KEY_3" "${{ secrets.NIM_API_KEY_3 }}"
          set_env "NIM_API_KEY_4" "${{ secrets.NIM_API_KEY_4 }}"
          set_env "NIM_API_KEY_5" "${{ secrets.NIM_API_KEY_5 }}"
          set_env "NIM_API_KEY_6" "${{ secrets.NIM_API_KEY_6 }}"
          set_env "NIM_API_KEY_7" "${{ secrets.NIM_API_KEY_7 }}"
          
          echo "=== Step 5: Verify ==="
          VERIFY=$(curl -s "https://api.render.com/v1/services/${SID}" \
            -H "Authorization: Bearer ${RENDER_KEY}" \
            -H "Accept: application/json" || echo "{}")
          echo "${VERIFY}" | jq -r '{name: .service.name, id: .service.id, url: .service.dashboardUrl, suspended: .service.serviceDetails.suspended}' 2>/dev/null || echo "verify response: ${VERIFY}"
          
          echo ""
          echo "DONE. Check dashboard: https://dashboard.render.com"
