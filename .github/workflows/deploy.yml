name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -n "$RENDER_SERVICE_ID" ] && [ -n "$RENDER_API_KEY" ]; then
            curl -X POST \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json" \
              -d '{"clearCache": "do_not_clear"}'
            echo "Deploy triggered!"
          else
            echo "RENDER_SERVICE_ID or RENDER_API_KEY not set. Skipping deploy."
            echo "To enable auto-deploy:"
            echo "  1. Go to https://dashboard.render.com/"
            echo "  2. Create a Web Service from this repo"
            echo "  3. Add RENDER_API_KEY and RENDER_SERVICE_ID to GitHub Secrets"
          fi
